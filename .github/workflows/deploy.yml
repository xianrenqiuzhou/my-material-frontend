name: Deploy to CloudBase

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Check files
        run: |
          echo "=== 检查文件结构 ==="
          ls -la
          ls -la frontend/ 2>/dev/null || echo "❌ frontend 目录不存在!"

      - name: Install CloudBase CLI
        run: |
          npm install -g @cloudbase/cli@latest
          tcb --version

      - name: Login to CloudBase
        run: |
          tcb login --apiKeyId "${{ secrets.TCB_SECRET_ID }}" --apiKey "${{ secrets.TCB_SECRET_KEY }}"

      - name: Deploy Frontend
        run: |
          if [ ! -d "frontend" ]; then
            echo "❌ frontend 目录不存在!"
            exit 1
          fi
          if [ ! -f "frontend/index.html" ]; then
            echo "❌ frontend/index.html 不存在!"
            exit 1
          fi

          echo "✅ 开始部署前端..."
          tcb hosting deploy ./frontend /             -e ${{ secrets.TCB_ENV_ID }}             --yes
        env:
          TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID }}
          TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY }}

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: deploy-frontend
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Check backend
        run: |
          if [ ! -d "backend" ] || [ ! -f "backend/Dockerfile" ]; then
            echo "⚠️ backend 不存在，跳过"
            exit 0
          fi
          echo "✅ 发现 backend，开始部署..."

      - name: Install CloudBase CLI
        run: |
          npm install -g @cloudbase/cli@latest

      - name: Login to CloudBase
        run: |
          tcb login --apiKeyId "${{ secrets.TCB_SECRET_ID }}" --apiKey "${{ secrets.TCB_SECRET_KEY }}"

      - name: Debug CLI Help
        run: |
          echo "=== CLI 版本信息 ==="
          tcb --version
          echo ""
          echo "=== tcb run --help ==="
          tcb run --help || true
          echo ""
          echo "=== tcb run deploy --help ==="
          tcb run deploy --help || true

      - name: Deploy Backend
        run: |
          if [ ! -d "backend" ] || [ ! -f "backend/Dockerfile" ]; then
            exit 0
          fi

          cd backend
          echo "=== 部署后端 ==="

          # 方法1: 使用环境变量传递（避免参数解析问题）
          export TCB_ENV_ID="${{ secrets.TCB_ENV_ID }}"
          echo "环境ID: ${TCB_ENV_ID}"

          # 尝试使用 tcb framework deploy（另一种部署方式）
          echo "尝试使用 tcb framework deploy..."
          tcb framework deploy             -e ${{ secrets.TCB_ENV_ID }}             --yes || {
              echo "framework deploy 失败，尝试 run deploy..."

              # 方法2: 使用 tcb run deploy 带完整参数
              tcb run deploy                 -e "${{ secrets.TCB_ENV_ID }}"                 -s material-api                 --containerPort 8080                 --path .                 --cpu 0.25                 --mem 0.5                 --minNum 1                 --maxNum 5                 --yes || {
                  echo "run deploy 也失败，尝试使用配置文件..."

                  # 方法3: 创建 cloudbaserc.json 配置文件
                  echo '{"version":"2.0","envId":"'${{ secrets.TCB_ENV_ID }}'","framework":{"name":"material-api","plugins":{"client":{"use":"@cloudbase/framework-plugin-container","inputs":{"serviceName":"material-api","servicePath":"/","localPath":".","containerPort":8080}}}}}'> cloudbaserc.json

                  tcb framework deploy -e ${{ secrets.TCB_ENV_ID }} --yes
                }
            }
        env:
          TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID }}
          TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY }}

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    if: always()

    steps:
      - name: Results
        run: |
          echo "部署结果:"
          echo "  前端: ${{ needs.deploy-frontend.result }}"
          echo "  后端: ${{ needs.deploy-backend.result }}"
