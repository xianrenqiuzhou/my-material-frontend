name: Deploy to CloudBase

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: '24'

jobs:
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Check files
        run: |
          echo "=== 检查文件结构 ==="
          ls -la
          echo ""
          echo "=== frontend 目录 ==="
          ls -la frontend/ 2>/dev/null || echo "❌ frontend 目录不存在"

      - name: Install CloudBase CLI
        run: |
          npm install -g @cloudbase/cli@latest
          tcb --version

      - name: Login to CloudBase
        run: |
          tcb login --apiKeyId "${{ secrets.TCB_SECRET_ID }}" --apiKey "${{ secrets.TCB_SECRET_KEY }}"

      - name: Deploy Frontend
        run: |
          echo "=== 开始部署前端 ==="
          if [ ! -d "frontend" ]; then
            echo "❌ frontend 目录不存在，创建并复制文件..."
            mkdir -p frontend
            # 如果根目录有 index.html，复制到 frontend
            if [ -f "index.html" ]; then
              cp index.html frontend/
            fi
          fi

          # 确保 frontend 目录有文件
          if [ ! -f "frontend/index.html" ]; then
            echo "❌ frontend/index.html 不存在"
            exit 1
          fi

          echo "✅ 发现 frontend/index.html，开始部署..."

          # 使用新版 CLI 语法部署
          tcb hosting deploy ./frontend /             --envId ${{ secrets.TCB_ENV_ID }}             --yes || {
              echo "尝试备用语法..."
              tcb hosting deploy ./frontend /                 -e ${{ secrets.TCB_ENV_ID }}                 --yes
            }
        env:
          TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID }}
          TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY }}

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: deploy-frontend
    if: always() && needs.deploy-frontend.result == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Check backend files
        run: |
          echo "=== 检查后端文件 ==="
          ls -la backend/ 2>/dev/null || echo "❌ backend 目录不存在"

      - name: Install CloudBase CLI
        run: |
          npm install -g @cloudbase/cli@latest
          tcb --version

      - name: Login to CloudBase
        run: |
          tcb login --apiKeyId "${{ secrets.TCB_SECRET_ID }}" --apiKey "${{ secrets.TCB_SECRET_KEY }}"

      - name: Deploy Backend
        run: |
          if [ ! -d "backend" ] || [ ! -f "backend/Dockerfile" ]; then
            echo "⚠️ backend 目录或 Dockerfile 不存在，跳过"
            exit 0
          fi

          cd backend
          echo "=== 后端文件列表 ==="
          ls -la

          echo "=== 开始部署后端 ==="
          tcb run deploy             --envId ${{ secrets.TCB_ENV_ID }}             --serviceName material-api             --containerPort 8080             --path .             --cpu 0.25             --mem 0.5             --minNum 1             --maxNum 5             --yes || {
              echo "尝试备用语法..."
              tcb run deploy                 -e ${{ secrets.TCB_ENV_ID }}                 -s material-api                 -p 8080                 --path .                 --yes
            }
        env:
          TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID }}
          TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY }}

  notify:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    if: always()

    steps:
      - name: Summary
        run: |
          echo "=== 部署结果 ==="
          echo "Frontend: ${{ needs.deploy-frontend.result }}"
          echo "Backend: ${{ needs.deploy-backend.result }}"
          echo ""
          echo "访问地址:"
          echo "Frontend: https://${{ secrets.TCB_ENV_ID }}.tcloudbaseapp.com"
          echo "Backend: https://material-api-${{ secrets.TCB_ENV_ID }}.ap-shanghai.app.tcloudbase.com"
